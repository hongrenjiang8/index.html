<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐍 貪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
        }


        .game-container {
            background: #16213e;
            padding: 30px 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }


        h1 {
            color: #0f9b8e;
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }


        .score-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #eee;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }


        .score-box span {
            background: #0f3460;
            padding: 6px 18px;
            border-radius: 10px;
            color: #e94560;
        }


        canvas {
            display: block;
            margin: 0 auto;
            background: #0f3460;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
        }


        .info {
            color: #888;
            font-size: 14px;
            margin: 12px 0;
        }


        .btn {
            background: #0f9b8e;
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 36px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }


        .btn:hover {
            background: #0cb8a8;
            transform: scale(1.03);
        }


        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }


        .controls button {
            width: 60px;
            height: 60px;
            font-size: 26px;
            background: #0f3460;
            color: #eee;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
        }


        .controls button:active {
            background: #1a5276;
            transform: scale(0.93);
        }
    </style>
</head>
<body>


<div class="game-container">
    <h1>🐍 貪吃蛇</h1>
    <div class="score-box">
        <span>🍎 分數：<span id="scoreDisplay">0</span></span>
        <span>🏆 最高：<span id="highScoreDisplay">0</span></span>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="info">⬆⬇⬅➡ 方向鍵移動 · 空格暫停</div>
    <button class="btn" id="restartBtn">🔄 重新開始</button>
    <div class="controls">
        <button id="btnUp">⬆</button>
        <button id="btnDown">⬇</button>
         <button id="btnLeft">⬅</button>
        <button id="btnRight">➡</button>
    </div>
</div>


<script>
    // ----- 設定 -----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const highScoreSpan = document.getElementById('highScoreDisplay');


    const GRID_SIZE = 20;        // 20x20 網格
    const CELL_SIZE = canvas.width / GRID_SIZE; // 20px


    // ----- 遊戲狀態 -----
    let snake = [];             // 身體座標陣列 [x, y]
    let food = { x: 8, y: 10 };
    let direction = 'RIGHT';    // 當前方向
    let nextDirection = 'RIGHT';
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
    let gameOver = false;
    let win = false;
    let paused = false;
    let gameLoop = null;
    let speed = 150;           // 毫秒


    highScoreSpan.textContent = highScore;


    // ----- 初始化 -----
    function initGame() {
        snake = [
            { x: 9, y: 10 },
            { x: 8, y: 10 },
            { x: 7, y: 10 }
        ];
        direction = 'RIGHT';
        nextDirection = 'RIGHT';
        score = 0;
        gameOver = false;
        win = false;
        paused = false;
        scoreSpan.textContent = '0';
        spawnFood();
        draw();
    }


    // ----- 隨機生成食物（避開蛇身）-----
    function spawnFood() {
        const totalCells = GRID_SIZE * GRID_SIZE;
        if (snake.length >= totalCells) {
            win = true;
            gameOver = true;
            return;
        }


        const snakeSet = new Set(snake.map(cell => `${cell.x},${cell.y}`));
        const freeCells = [];
        for (let i = 0; i < GRID_SIZE; i++) {
            for (let j = 0; j < GRID_SIZE; j++) {
                if (!snakeSet.has(`${i},${j}`)) {
                    freeCells.push({ x: i, y: j });
                }
            }
        }
        if (freeCells.length === 0) {
            win = true;
            gameOver = true;
            return;
        }
        food = freeCells[Math.floor(Math.random() * freeCells.length)];
    }


    // ----- 更新邏輯 -----
    function update() {
        if (gameOver || paused) return;


        // 更新方向
        direction = nextDirection;


        // 計算新頭部
        const head = snake[0];
        let newHead = { ...head };
        switch (direction) {
            case 'RIGHT': newHead.x += 1; break;
            case 'LEFT':  newHead.x -= 1; break;
            case 'UP':    newHead.y -= 1; break;
            case 'DOWN':  newHead.y += 1; break;
        }


        // 檢查是否吃到食物
        const ate = (newHead.x === food.x && newHead.y === food.y);


        // 插入新頭部
        snake.unshift(newHead);
        if (!ate) {
            snake.pop(); // 沒吃到就移除尾部
        } else {
            score++;
            scoreSpan.textContent = score;
            spawnFood();
            if (gameOver) { // 可能因為全滿而勝利
                draw();
                return;
            }
        }


        // 碰撞檢測
        const headPos = snake[0];
        // 撞牆
        if (headPos.x < 0 || headPos.x >= GRID_SIZE || headPos.y < 0 || headPos.y >= GRID_SIZE) {
            gameOver = true;
            draw();
            return;
        }
        // 撞自己（檢查頭部是否與身體其他部分重疊）
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === headPos.x && snake[i].y === headPos.y) {
                gameOver = true;
                draw();
                return;
            }
        }


        draw();
    }


    // ----- 繪製畫面 -----
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);


        // 網格線（淡）
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(canvas.width, i * CELL_SIZE);
            ctx.stroke();
        }


        // 食物
        ctx.fillStyle = '#e94560';
        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
        const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
        ctx.arc(fx, fy, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;


        // 蛇身
        snake.forEach((seg, idx) => {
            const x = seg.x * CELL_SIZE;
            const y = seg.y * CELL_SIZE;
            const padding = 1;
            const radius = 4;


            // 漸層顏色：頭部亮綠色，身體漸深
            const ratio = idx / Math.max(snake.length - 1, 1);
            const g = Math.round(200 - ratio * 70);
            const r = Math.round(20 + ratio * 20);
            const b = Math.round(80 - ratio * 40);
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;


            ctx.shadowColor = 'rgba(15,155,142,0.4)';
            ctx.shadowBlur = 8;


            ctx.beginPath();
            ctx.roundRect(x + padding, y + padding, CELL_SIZE - padding * 2, CELL_SIZE - padding * 2, radius);
            ctx.fill();


            // 頭部眼睛
            if (idx === 0) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                let ex1, ey1, ex2, ey2;
                const eyeOff = 5;
                const eyeR = 3;
                if (direction === 'RIGHT') {
                    ex1 = x + 13; ey1 = y + 4;
                    ex2 = x + 13; ey2 = y + 12;
                } else if (direction === 'LEFT') {
                    ex1 = x + 5;  ey1 = y + 4;
                    ex2 = x + 5;  ey2 = y + 12;
                } else if (direction === 'UP') {
                    ex1 = x + 4;  ey1 = y + 5;
                    ex2 = x + 12; ey2 = y + 5;
                } else {
                    ex1 = x + 4;  ey1 = y + 13;
                    ex2 = x + 12; ey2 = y + 13;
                }
                ctx.beginPath();
                ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2);
                ctx.fill();


                // 瞳孔
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(ex1, ey1, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        });
        ctx.shadowBlur = 0;


        // 遊戲結束 / 暫停 / 勝利 訊息
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);


            ctx.fillStyle = win ? '#ffd700' : '#e94560';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = win ? '#ffd700' : '#e94560';
            ctx.shadowBlur = 20;
            ctx.fillText(win ? '🎉 勝利！' : '💀 遊戲結束', canvas.width / 2, canvas.height / 2 - 12);
            ctx.shadowBlur = 0;


            ctx.fillStyle = '#ccc';
            ctx.font = '18px Arial';
            ctx.fillText('按「重新開始」繼續', canvas.width / 2, canvas.height / 2 + 36);
        } else if (paused) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f9b8e';
            ctx.font = 'bold 38px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⏸ 暫停', canvas.width / 2, canvas.height / 2);
        }


        // 更新最高分
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('snakeHighScore', String(highScore));
            highScoreSpan.textContent = highScore;
        }
    }


    // roundRect polyfill for canvas
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (r > w / 2) r = w / 2;
            if (r > h / 2) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };
    }


    // ----- 遊戲循環 -----
    function startLoop() {
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(update, speed);
    }


    // ----- 鍵盤事件 -----
    function handleKey(e) {
        const key = e.key;
        e.preventDefault();


        if (key === ' ') {
            if (!gameOver) {
                paused = !paused;
                draw();
            }
            return;
        }


        if (gameOver || paused) return;


        const opposite = {
            'ArrowUp': 'DOWN',
            'ArrowDown': 'UP',
            'ArrowLeft': 'RIGHT',
            'ArrowRight': 'LEFT'
        };


        const dirMap = {
            'ArrowUp': 'UP',
            'ArrowDown': 'DOWN',
            'ArrowLeft': 'LEFT',
            'ArrowRight': 'RIGHT'
        };


        if (dirMap[key] && dirMap[key] !== opposite[key]) {
            nextDirection = dirMap[key];
        }
    }


    // ----- 按鈕事件 -----
    function setDirection(dir) {
        if (gameOver || paused) return;
        const opposite = {
            'UP': 'DOWN',
            'DOWN': 'UP',
            'LEFT': 'RIGHT',
            'RIGHT': 'LEFT'
        };
        if (dir !== opposite[direction]) {
            nextDirection = dir;
        }
    }


    // ----- 監聽 -----
    document.addEventListener('keydown', handleKey);


    document.getElementById('restartBtn').addEventListener('click', () => {
        clearInterval(gameLoop);
        initGame();
        startLoop();
    });


    document.getElementById('btnUp').addEventListener('click', () => setDirection('UP'));
    document.getElementById('btnDown').addEventListener('click', () => setDirection('DOWN'));
    document.getElementById('btnLeft').addEventListener('click', () => setDirection('LEFT'));
    document.getElementById('btnRight').addEventListener('click', () => setDirection('RIGHT'));


    // ----- 啟動 -----
    initGame();
    startLoop();
</script>


</body>
</html>
